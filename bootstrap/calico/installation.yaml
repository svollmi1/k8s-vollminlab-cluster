apiVersion: operator.tigera.io/v1
kind: Installation
metadata:
  name: default
spec:
  variant: Calico
  cni:
    type: Calico
    ipam:
      type: Calico
  calicoNetwork:
    bgp: Enabled
    hostPorts: Enabled
    linuxDataplane: Iptables
    multiInterfaceMode: None
    nodeAddressAutodetectionV4:
      firstFound: true
    windowsDataplane: Disabled
    ipPools:
      - name: default-ipv4-ippool
        cidr: 172.18.0.0/16
        encapsulation: IPIP
        natOutgoing: Enabled
        nodeSelector: all()
        blockSize: 26
        allowedUses:
          - Workload
          - Tunnel
        disableBGPExport: false
        disableNewAllocations: false
  controlPlaneReplicas: 2
  nonPrivileged: Disabled
  nodeUpdateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  logging:
    cni:
      logSeverity: Info
      logFileMaxSize: 100Mi
      logFileMaxCount: 10
      logFileMaxAgeDays: 30
