apiVersion: v1
kind: ConfigMap
metadata:
  name: kube-prometheus-stack-values
  namespace: monitoring
  labels:
    app: kube-prometheus-stack
    env: production
    category: observability
data:
  values.yaml: |
    fullnameOverride: kube-prometheus-stack

    prometheus:
      prometheusSpec:
        externalUrl: https://prometheus.vollminlab.com
        scrapeInterval: 30s
        retention: 15d
        retentionSize: 9GB
        serviceMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelector: {}
        serviceMonitorNamespaceSelector: {}
        podMetadata:
          labels:
            app: prometheus
            env: production
            category: observability
        resources:
          requests:
            cpu: 250m
            memory: 1Gi
          limits:
            cpu: 1000m
            memory: 2Gi
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 10Gi

    grafana:
      enabled: true
      ingress:
        enabled: false
      admin:
        existingSecret: grafana-admin-credentials
        userKey: admin-user
        passwordKey: admin-password
      podLabels:
        app: grafana
        env: production
        category: observability
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi
      plugins:
        - grafana-lokiexplore-app

      dashboardProviders:
        dashboardproviders.yaml:
          apiVersion: 1
          providers:
            - name: default
              orgId: 1
              folder: ''
              type: file
              disableDeletion: false
              editable: true
              options:
                path: /var/lib/grafana/dashboards/default

      dashboards:
        default:
          longhorn:
            gnetId: 13032
            revision: 6
            datasource: prometheus
          velero:
            gnetId: 11055
            revision: 2
            datasource: prometheus

      additionalDataSources:
        - name: Loki
          type: loki
          url: http://loki.monitoring.svc.cluster.local:3100
          access: proxy

    alertmanager:
      alertmanagerSpec:
        replicas: 3
        externalUrl: https://alertmanager.vollminlab.com
        configSecret: alertmanager-pushover-config
        podMetadata:
          labels:
            app: alertmanager
            env: production
            category: observability
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 1Gi

    prometheus-node-exporter:
      tolerations:
        - key: dmz
          operator: Equal
          value: "true"
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      podLabels:
        app: node-exporter
        env: production
        category: observability
      prometheus:
        monitor:
          relabelings:
            - sourceLabels: [__meta_kubernetes_pod_node_name]
              targetLabel: instance

    kubeEtcd:
      enabled: true
      endpoints:
        - 192.168.152.8
        - 192.168.152.9
        - 192.168.152.10
      service:
        port: 2381
        targetPort: 2381

    kubeControllerManager:
      enabled: true
      endpoints:
        - 192.168.152.8
        - 192.168.152.9
        - 192.168.152.10

    kubeScheduler:
      enabled: true
      endpoints:
        - 192.168.152.8
        - 192.168.152.9
        - 192.168.152.10

    kubeProxy:
      enabled: true

    defaultRules:
      rules:
        kubeApiserver: true
        etcd: true
      disabled:
        KubeClientCertificateExpiration: true

    kube-state-metrics:
      podLabels:
        app: kube-state-metrics
        env: production
        category: observability
