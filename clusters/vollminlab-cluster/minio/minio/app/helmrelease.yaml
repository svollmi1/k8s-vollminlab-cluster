apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minio
  namespace: minio
  labels:
    app: minio
    env: production
    category: storage
spec:
  interval: 10m
  chart:
    spec:
      chart: minio
      version: 17.0.21
      sourceRef:
        kind: HelmRepository
        name: minio
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: minio-values
