apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: arc-runners
  namespace: actions-runner-system
  labels:
    app: arc-runners
    env: production
    category: apps
spec:
  interval: 10m
  chart:
    spec:
      chart: gha-runner-scale-set
      version: "0.14.0"
      sourceRef:
        kind: HelmRepository
        name: arc
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: arc-runners-values
