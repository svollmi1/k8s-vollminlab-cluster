apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: arc-runners
  namespace: actions-runner-system
  labels:
    app: arc-runners
    env: production
    category: ci
spec:
  interval: 10m
  chartRef:
    kind: OCIRepository
    name: arc-runners-repo
    namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: arc-runners-values
