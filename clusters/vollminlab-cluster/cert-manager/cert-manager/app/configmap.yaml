apiVersion: v1
kind: ConfigMap
metadata:
  name: cert-manager-values
  namespace: cert-manager
  labels:
    app: cert-manager
    env: production
    category: security
data:
  values.yaml: |
    extraArgs:
      - --dns01-recursive-nameservers-only
      - --dns01-recursive-nameservers=10.96.0.10:53
