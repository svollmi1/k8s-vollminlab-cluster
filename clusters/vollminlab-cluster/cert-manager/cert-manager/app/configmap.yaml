apiVersion: v1
kind: ConfigMap
metadata:
  name: cert-manager-values
  namespace: cert-manager
  labels:
    app: cert-manager
    env: production
    category: security
data:
  values.yaml: |
    extraArgs:
      - --dns01-recursive-nameservers-only
      - --dns01-recursive-nameservers=1.1.1.1:53,8.8.8.8:53
    prometheus:
      enabled: true
      servicemonitor:
        enabled: true
