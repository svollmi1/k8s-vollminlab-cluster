apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: shlink-db
  namespace: shlink
  labels:
    app: shlink-db
    env: production
    category: apps
spec:
  instances: 1
  inheritedMetadata:
    labels:
      app: shlink-db
      env: production
      category: apps
  storage:
    size: 5Gi
    storageClass: longhorn
  bootstrap:
    initdb:
      database: shlink
      owner: shlink
      secret:
        name: shlink-db-credentials
      postInitSQL:
        - GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO shlink
        - GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO shlink
        - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO shlink
        - ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO shlink
  backup:
    barmanObjectStore:
      destinationPath: "s3://cnpg-backups/shlink-db"
      endpointURL: "http://minio.minio.svc.cluster.local:9000"
      s3Credentials:
        accessKeyId:
          name: cnpg-minio-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-minio-credentials
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
        maxParallel: 2
    retentionPolicy: "30d"
