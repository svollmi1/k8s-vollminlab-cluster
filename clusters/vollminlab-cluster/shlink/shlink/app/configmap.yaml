apiVersion: v1
kind: ConfigMap
metadata:
  name: shlink-values
  namespace: shlink
data:
  values.yaml: |
    podLabels:
      app: shlink
      env: production
      category: apps

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

    config:
      general:
        defaultDomain: go.vollminlab.com
        isHttpsEnabled: true
        timezone: America/New_York
        autoResolveTitles: true

      redirects:
        defaultBaseUrlRedirect: https://homepage.vollminlab.com
        defaultInvalidShortUrlRedirect: https://homepage.vollminlab.com
        defaultRegular404Redirect: https://homepage.vollminlab.com
        statusCode: 302

      trackingVisits:
        anonymizeRemoteAddr: true
        trackOrphanVisits: true

    # Initial API key is injected from shlink-credentials secret at first startup.
    # After first run, manage API keys via the web UI.
    extraEnv:
      - name: INITIAL_API_KEY
        valueFrom:
          secretKeyRef:
            name: shlink-credentials
            key: initial-api-key

    postgresql:
      enabled: true
      auth:
        database: shlink
        username: shlink
        existingSecret: shlink-credentials
        secretKeys:
          adminPasswordKey: postgresql-password
          userPasswordKey: postgresql-password
      primary:
        podLabels:
          app: shlink-postgresql
          env: production
          category: apps
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
