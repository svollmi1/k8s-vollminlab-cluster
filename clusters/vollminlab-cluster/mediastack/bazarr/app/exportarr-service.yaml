apiVersion: v1
kind: Service
metadata:
  name: bazarr-exportarr
  namespace: mediastack
  labels:
    app: bazarr-exportarr
    env: production
    category: media
spec:
  selector:
    app: bazarr-exportarr
  ports:
    - name: metrics
      port: 9707
      targetPort: metrics
      protocol: TCP
