apiVersion: apps/v1
kind: Deployment
metadata:
  name: sabnzbd-exportarr
  namespace: mediastack
  labels:
    app: sabnzbd-exportarr
    env: production
    category: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sabnzbd-exportarr
  template:
    metadata:
      labels:
        app: sabnzbd-exportarr
        env: production
        category: media
    spec:
      containers:
        - name: exportarr
          image: ghcr.io/onedr0p/exportarr:v2.2.0@sha256:320b0ea7399f4b9af4741dcdddd7d40c05c36b0359679305d8a54df4e97065df
          args: ["sabnzbd"]
          env:
            - name: URL
              value: "http://sabnzbd:10097"
            - name: PORT
              value: "9707"
            - name: INTERFACE
              value: "0.0.0.0"
            - name: APIKEY
              valueFrom:
                secretKeyRef:
                  name: sabnzbd-exportarr-apikey
                  key: api-key
          ports:
            - name: metrics
              containerPort: 9707
              protocol: TCP
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
