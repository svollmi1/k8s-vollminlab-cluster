apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: cloudflared-tunnel-credentials
  namespace: mediastack
  labels:
    app: cloudflared
    env: production
    category: networking
spec:
  encryptedData:
    # REPLACE THIS VALUE before merging.
    # Steps:
    #   1. Create a Cloudflare Tunnel in Zero Trust dashboard (one.dash.cloudflare.com)
    #   2. Under Public Hostnames, add:
    #        plex.vollminlab.com → http://plex.mediastack.svc.cluster.local:32400
    #   3. Copy the tunnel token from the dashboard
    #   4. Save the token to 1Password (Homelab vault) as "Cloudflare Tunnel Token - vollminlab"
    #   5. Seal it:
    #        kubeseal --fetch-cert \
    #          --controller-namespace sealed-secrets \
    #          --controller-name sealed-secrets-controller > pub-cert.pem
    #        kubectl create secret generic cloudflared-tunnel-credentials \
    #          -n mediastack \
    #          --from-literal=tunnel-token=<YOUR_TOKEN> \
    #          --dry-run=client -o yaml | \
    #          kubeseal --cert pub-cert.pem --format yaml > \
    #          clusters/vollminlab-cluster/mediastack/cloudflared/app/cloudflared-tunnel-sealedsecret.yaml
    #        rm pub-cert.pem
    tunnel-token: PLACEHOLDER_REPLACE_BEFORE_MERGING
  template:
    metadata:
      name: cloudflared-tunnel-credentials
      namespace: mediastack
      labels:
        app: cloudflared
        env: production
        category: networking
