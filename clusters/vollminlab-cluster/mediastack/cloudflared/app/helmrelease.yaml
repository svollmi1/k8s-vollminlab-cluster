apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudflared
  namespace: mediastack
  labels:
    app: cloudflared
    env: production
    category: networking
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: cloudflared-repo
    namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: cloudflared-values
      valuesKey: values.yaml
