apiVersion: v1
kind: Service
metadata:
  name: jellystat-postgresql
  namespace: mediastack
  labels:
    app: jellystat
    env: production
    category: media
spec:
  type: ClusterIP
  selector:
    cnpg.io/cluster: jellystat-db
    cnpg.io/instanceRole: primary
  ports:
    - port: 5432
      targetPort: 5432
