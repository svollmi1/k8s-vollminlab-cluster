apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex
  namespace: mediastack
  labels:
    app: plex
    env: production
    category: media
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: plex-repo
    namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: plex-values
      valuesKey: values.yaml
