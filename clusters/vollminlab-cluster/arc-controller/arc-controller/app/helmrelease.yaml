apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: arc-controller
  namespace: arc-controller
  labels:
    app: arc-controller
    env: production
    category: apps
spec:
  interval: 10m
  chart:
    spec:
      chart: gha-runner-scale-set-controller
      version: "0.14.0"
      sourceRef:
        kind: HelmRepository
        name: arc-repo
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: arc-controller-values
