apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-values
  namespace: homepage
  labels:
    app: homepage
    env: production
    category: apps
data:
  values.yaml: |
    config:
      kubernetes:
        mode: cluster
      services:
        - Media Stack:
            - Jellyfin:
                description: Media streaming server
                href: https://jellyfin.vollminlab.com
                icon: jellyfin.png
                namespace: mediastack
                app: jellyfin
                widget:
                  type: jellyfin
                  url: http://jellyfin.mediastack.svc.cluster.local:8096
                  key: "{{HOMEPAGE_VAR_JELLYFIN_API_KEY}}"
                  enableBlocks: true
            - Audiobookshelf:
                description: Audiobook and podcast server
                href: https://audiobookshelf.vollminlab.com
                icon: audiobookshelf.png
                namespace: mediastack
                app: audiobookshelf
                widget:
                  type: audiobookshelf
                  url: http://audiobookshelf.mediastack.svc.cluster.local:10223
                  key: "{{HOMEPAGE_VAR_AUDIOBOOKSHELF_API_KEY}}"
            - Seerr:
                description: Media request management
                href: https://seerr.vollminlab.com
                icon: overseerr.png
                namespace: mediastack
                app: seerr-chart
                widget:
                  type: overseerr
                  url: http://seerr-seerr-chart.mediastack.svc.cluster.local
                  key: "{{HOMEPAGE_VAR_SEERR_API_KEY}}"
            - Jellystat:
                description: Jellyfin statistics and analytics
                href: https://jellystat.vollminlab.com
                icon: jellystat.png
                namespace: mediastack
                app: jellystat
                widget:
                  type: jellystat
                  url: http://jellystat.mediastack.svc.cluster.local:3000
                  key: "{{HOMEPAGE_VAR_JELLYSTAT_API_KEY}}"
            - Sonarr:
                description: TV show collection manager
                href: https://sonarr.vollminlab.com
                icon: sonarr.png
                namespace: mediastack
                app: sonarr
                widget:
                  type: sonarr
                  url: http://sonarr.mediastack.svc.cluster.local:8989
                  key: "{{HOMEPAGE_VAR_SONARR_API_KEY}}"
            - Radarr:
                description: Movie collection manager
                href: https://radarr.vollminlab.com
                icon: radarr.png
                namespace: mediastack
                app: radarr
                widget:
                  type: radarr
                  url: http://radarr.mediastack.svc.cluster.local:7878
                  key: "{{HOMEPAGE_VAR_RADARR_API_KEY}}"
            - Prowlarr:
                description: Indexer manager
                href: https://prowlarr.vollminlab.com
                icon: prowlarr.png
                namespace: mediastack
                app: prowlarr
                widget:
                  type: prowlarr
                  url: http://prowlarr.mediastack.svc.cluster.local:9696
                  key: "{{HOMEPAGE_VAR_PROWLARR_API_KEY}}"
            - SABnzbd:
                description: Usenet downloader
                href: https://sabnzbd.vollminlab.com
                icon: sabnzbd.png
                namespace: mediastack
                app: sabnzbd
                widget:
                  type: sabnzbd
                  url: http://sabnzbd.mediastack.svc.cluster.local:10097
                  key: "{{HOMEPAGE_VAR_SABNZBD_API_KEY}}"
            - Bazarr:
                description: Subtitle manager
                href: https://bazarr.vollminlab.com
                icon: bazarr.png
                namespace: mediastack
                app: bazarr
                widget:
                  type: bazarr
                  url: http://bazarr.mediastack.svc.cluster.local:6767
                  key: "{{HOMEPAGE_VAR_BAZARR_API_KEY}}"
        - Infrastructure:
            - TrueNAS:
                description: Network attached storage
                href: https://truenas.vollminlab.com
                icon: truenas.png
                ping: https://truenas.vollminlab.com
                widget:
                  type: truenas
                  url: https://truenas.vollminlab.com
                  username: "{{HOMEPAGE_VAR_TRUENAS_USERNAME}}"
                  password: "{{HOMEPAGE_VAR_TRUENAS_PASSWORD}}"
                  enablePools: true
            - Authentik:
                description: Identity provider and SSO
                href: https://authentik.vollminlab.com/if/admin/
                icon: authentik.png
                namespace: authentik
                app: authentik
                widget:
                  type: authentik
                  url: http://authentik-server.authentik.svc.cluster.local
                  key: "{{HOMEPAGE_VAR_AUTHENTIK_API_KEY}}"
                  version: 2
            - vCenter:
                description: VMware vCenter Server
                href: https://vcenter.vollminlab.com
                icon: vmware-esxi.png
                ping: https://vcenter.vollminlab.com
            - Portainer:
                description: Container management
                href: https://portainer.vollminlab.com
                icon: portainer.png
                namespace: portainer
                app: portainer
            - Harbor:
                description: Container image registry
                href: https://harbor.vollminlab.com
                icon: harbor.png
                namespace: harbor
                app: harbor
            - MinIO:
                description: S3-compatible object storage
                href: https://minio.vollminlab.com
                icon: minio.png
                namespace: minio
                app: minio
            - Longhorn:
                description: Kubernetes storage management
                href: https://longhorn.vollminlab.com
                icon: longhorn.png
                namespace: longhorn-system
                app: longhorn
        - Networking:
            - Pi-hole:
                description: DNS sinkhole and ad blocker
                href: https://pihole.vollminlab.com/admin
                icon: pi-hole.png
                ping: https://pihole.vollminlab.com
                widget:
                  type: pihole
                  url: https://pihole.vollminlab.com
                  version: 6
                  key: "{{HOMEPAGE_VAR_PIHOLE_API_KEY}}"
            - UDM:
                description: UniFi Dream Machine
                href: https://udm.vollminlab.com
                icon: unifi.png
                ping: https://udm.vollminlab.com
                widget:
                  type: unifi
                  url: https://udm.vollminlab.com
                  key: "{{HOMEPAGE_VAR_UDM_API_KEY}}"
            - Nginx Proxy Manager:
                description: Reverse proxy management
                href: https://npm.vollminlab.com
                icon: nginx-proxy-manager.png
                ping: https://npm.vollminlab.com
                widget:
                  type: npm
                  url: https://npm.vollminlab.com
                  username: "{{HOMEPAGE_VAR_NPM_USERNAME}}"
                  password: "{{HOMEPAGE_VAR_NPM_PASSWORD}}"
            - HAProxy Internal Stats:
                description: Load balancer statistics
                href: http://haproxyvip.vollminlab.com:8404/stats
                icon: haproxy.png
                ping: http://haproxyvip.vollminlab.com:8404/stats
            - HAProxy DMZ Stats:
                description: Load balancer statistics
                href: http://haproxydmzvip.vollminlab.com:8404/stats
                icon: haproxy.png
                ping: http://haproxydmzvip.vollminlab.com:8404/stats
        - Monitoring & Observability:
            - Policy Reporter:
                description: Kubernetes policy reporting
                href: https://policyreporter.vollminlab.com
                icon: https://raw.githubusercontent.com/kyverno/kyverno/main/img/logo.png
                namespace: kyverno
                app: policy-reporter-ui
            - Grafana:
                description: Metrics visualization
                href: https://grafana.vollminlab.com
                icon: grafana.png
                namespace: monitoring
                app: grafana
                widget:
                  type: grafana
                  url: http://kube-prometheus-stack-grafana.monitoring.svc.cluster.local:80
                  username: "{{HOMEPAGE_VAR_GRAFANA_USERNAME}}"
                  password: "{{HOMEPAGE_VAR_GRAFANA_PASSWORD}}"
            - Prometheus:
                description: Metrics collection
                href: https://prometheus.vollminlab.com
                icon: prometheus.png
                namespace: monitoring
                app: prometheus
                widget:
                  type: prometheus
                  url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
            - AlertManager:
                description: Prometheus alert management
                href: https://alertmanager.vollminlab.com
                icon: alertmanager.png
                namespace: monitoring
                app: alertmanager
        - Tools:
            - Homepage:
                description: This dashboard
                href: https://homepage.vollminlab.com
                icon: homepage.png
                namespace: homepage
                app: homepage
            - Headlamp:
                description: Kubernetes + Flux dashboard
                href: https://headlamp.vollminlab.com
                icon: kubernetes.png
                namespace: flux-system
                app: headlamp
            - Shlink:
                description: URL shortener dashboard
                href: https://shlink.vollminlab.com
                icon: shlink.png
                namespace: shlink
                app: shlink-web
            - Homelab Repo:
                description: This Kubernetes cluster repo
                href: https://github.com/vollminlab/k8s-vollminlab-cluster
                icon: github.png
            - Renovate:
                description: Dependency update automation
                href: https://github.com/vollminlab/k8s-vollminlab-cluster/issues?q=is%3Aopen+Dependency+Dashboard
                icon: renovate.png
        - Web Links:
            - ChatGPT:
                description: AI Assistant
                href: https://chatgpt.com
                icon: openai.png
            - Claude:
                description: AI Assistant
                href: https://claude.ai
                icon: anthropic.png
            - Reddit:
                description: Reddit /r/all
                href: https://www.reddit.com/r/all/
                icon: reddit.png
            - Chocolatey:
                description: Package manager community
                href: https://community.chocolatey.org
                icon: si-chocolatey
        - Personal:
            - Yahoo Fantasy Football:
                description: Yahoo Fantasy Football
                href: https://football.fantasysports.yahoo.com/
                icon: yahoo.png
            - ESPN Fantasy Football:
                description: ESPN Fantasy Football
                href: https://www.espn.com/fantasy/football/
                icon: mdi-football-helmet
            - Work Portal:
                description: Work access portal
                href: https://access-cloud.deshaw.com
                icon: si-citrix
            - GroupMe:
                description: Group messaging web
                href: https://web.groupme.com/chats
                icon: si-groupme
            - MakerWorld:
                description: 3D printing community
                href: https://makerworld.com/en
                icon: si-bambulab
      settings:
        theme: dark
        favicon: null
        title: "VollminLab Dashboard"
        subtitle: "HomeLab Services & Infrastructure"
        logo: null
        layout:
          Media Stack:
            style: row
            columns: 3
          Infrastructure:
            style: row
            columns: 4
          Networking:
            style: row
            columns: 5
          Monitoring & Observability:
            style: row
            columns: 4
          Tools:
            style: row
            columns: 5
          Web Links:
            style: row
            columns: 4
          Personal:
            style: row
            columns: 5
        providers:
          longhorn:
            url: http://longhorn-frontend.longhorn-system.svc.cluster.local
      widgets:
        - search:
            provider: google
            target: _blank
        - resources:
            cpu: true
            memory: true
            show: true
            showLabel: true
        - datetime:
            show: true
            showLabel: true
        - greeting:
            show: true
            showLabel: true
        - longhorn:
            expanded: true
            total: true
            labels: true
            nodes: true
        - openweathermap:
            apiKey: "{{HOMEPAGE_VAR_OPENWEATHER_API_KEY}}"
            latitude: "{{HOMEPAGE_VAR_WEATHER_LATITUDE}}"
            longitude: "{{HOMEPAGE_VAR_WEATHER_LONGITUDE}}"
            units: imperial
            cache: 5
      bookmarks: []
      enableRbac: true
    image:
      tag: "v1.13.1"
    serviceAccount:
      create: true
      name: homepage
    podLabels:
      app: homepage
      env: production
      category: apps
    env:
      - name: HOMEPAGE_VAR_OPENWEATHER_API_KEY
        valueFrom:
          secretKeyRef:
            name: homepage-env-vars
            key: OPENWEATHER_API_KEY
      - name: HOMEPAGE_VAR_WEATHER_LATITUDE
        valueFrom:
          secretKeyRef:
            name: homepage-env-vars
            key: WEATHER_LATITUDE
      - name: HOMEPAGE_VAR_WEATHER_LONGITUDE
        valueFrom:
          secretKeyRef:
            name: homepage-env-vars
            key: WEATHER_LONGITUDE
      - name: HOMEPAGE_VAR_TRUENAS_USERNAME
        valueFrom:
          secretKeyRef:
            name: homepage-env-vars
            key: TRUENAS_USERNAME
      - name: HOMEPAGE_VAR_TRUENAS_PASSWORD
        valueFrom:
          secretKeyRef:
            name: homepage-env-vars
            key: TRUENAS_PASSWORD
      - name: HOMEPAGE_VAR_SEERR_API_KEY
        valueFrom:
          secretKeyRef:
            name: homepage-env-vars
            key: SEERR_API_KEY
      - name: HOMEPAGE_VAR_SONARR_API_KEY
        valueFrom:
          secretKeyRef:
            name: homepage-env-vars
            key: SONARR_API_KEY
      - name: HOMEPAGE_VAR_RADARR_API_KEY
        valueFrom:
          secretKeyRef:
            name: homepage-env-vars
            key: RADARR_API_KEY
      - name: HOMEPAGE_VAR_PROWLARR_API_KEY
        valueFrom:
          secretKeyRef:
            name: homepage-env-vars
            key: PROWLARR_API_KEY
      - name: HOMEPAGE_VAR_SABNZBD_API_KEY
        valueFrom:
          secretKeyRef:
            name: homepage-env-vars
            key: SABNZBD_API_KEY
      - name: HOMEPAGE_VAR_JELLYSTAT_API_KEY
        valueFrom:
          secretKeyRef:
            name: homepage-env-vars
            key: JELLYSTAT_API_KEY
      - name: HOMEPAGE_VAR_PIHOLE_API_KEY
        valueFrom:
          secretKeyRef:
            name: homepage-env-vars
            key: PIHOLE_API_KEY
      - name: HOMEPAGE_VAR_BAZARR_API_KEY
        valueFrom:
          secretKeyRef:
            name: homepage-env-vars
            key: BAZARR_API_KEY
      - name: HOMEPAGE_VAR_JELLYFIN_API_KEY
        valueFrom:
          secretKeyRef:
            name: homepage-env-vars
            key: JELLYFIN_API_KEY
      - name: HOMEPAGE_VAR_AUDIOBOOKSHELF_API_KEY
        valueFrom:
          secretKeyRef:
            name: homepage-env-vars
            key: AUDIOBOOKSHELF_API_KEY
      - name: HOMEPAGE_VAR_GRAFANA_USERNAME
        valueFrom:
          secretKeyRef:
            name: homepage-env-vars
            key: GRAFANA_USERNAME
      - name: HOMEPAGE_VAR_GRAFANA_PASSWORD
        valueFrom:
          secretKeyRef:
            name: homepage-env-vars
            key: GRAFANA_PASSWORD
      - name: HOMEPAGE_VAR_PORTAINER_API_KEY
        valueFrom:
          secretKeyRef:
            name: homepage-env-vars
            key: PORTAINER_API_KEY
      - name: HOMEPAGE_VAR_NPM_USERNAME
        valueFrom:
          secretKeyRef:
            name: homepage-env-vars
            key: NPM_USERNAME
      - name: HOMEPAGE_VAR_NPM_PASSWORD
        valueFrom:
          secretKeyRef:
            name: homepage-env-vars
            key: NPM_PASSWORD
      - name: HOMEPAGE_VAR_UDM_API_KEY
        valueFrom:
          secretKeyRef:
            name: homepage-env-vars
            key: UDM_API_KEY
      - name: HOMEPAGE_VAR_SHLINK_API_KEY
        valueFrom:
          secretKeyRef:
            name: homepage-env-vars
            key: SHLINK_API_KEY
      - name: HOMEPAGE_VAR_HARBOR_USERNAME
        valueFrom:
          secretKeyRef:
            name: homepage-env-vars
            key: HARBOR_USERNAME
      - name: HOMEPAGE_VAR_HARBOR_PASSWORD
        valueFrom:
          secretKeyRef:
            name: homepage-env-vars
            key: HARBOR_PASSWORD
      - name: HOMEPAGE_VAR_MINIO_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: homepage-env-vars
            key: MINIO_ACCESS_KEY
      - name: HOMEPAGE_VAR_MINIO_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: homepage-env-vars
            key: MINIO_SECRET_KEY
      - name: HOMEPAGE_VAR_AUTHENTIK_API_KEY
        valueFrom:
          secretKeyRef:
            name: homepage-env-vars
            key: AUTHENTIK_API_KEY
      - name: HOMEPAGE_ALLOWED_HOSTS
        value: "homepage.vollminlab.com,localhost,127.0.0.1"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
