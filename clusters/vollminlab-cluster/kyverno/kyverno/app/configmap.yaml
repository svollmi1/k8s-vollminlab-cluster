apiVersion: v1
kind: ConfigMap
metadata:
  name: kyverno-values
  namespace: kyverno
  labels:
    app: kyverno
    env: production
    category: security
  annotations:
    meta.helm.sh/release-name: kyverno
    meta.helm.sh/release-namespace: kyverno
data:
  values.yaml: |
    podLabels:
      app: kyverno
      env: production
      category: security

    labels:
      app: kyverno
      env: production
      category: security

    webhookTimeout: 30

    admissionController:
      labels:
        app: kyverno-admission-controller
        env: production
        category: security
      podLabels:
        app: kyverno-admission-controller
        env: production
        category: security
      replicas: 3
      priorityClassName: system-cluster-critical
      failurePolicy: Ignore
      namespaceSelector:
        matchExpressions:
          - key: kubernetes.io/metadata.name
            operator: NotIn
            values:
              - kyverno
              - kube-system
              - flux-system
      resources:
        requests:
          cpu: 500m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 1Gi
      service:
        ports:
          - name: https
            port: 443
            targetPort: 9443

    validatingWebhookConfiguration:
      failurePolicy: Ignore
      namespaceSelector:
        matchExpressions:
          - key: kubernetes.io/metadata.name
            operator: NotIn
            values:
              - kyverno
              - kube-system
              - flux-system

    mutatingWebhookConfiguration:
      failurePolicy: Ignore
      namespaceSelector:
        matchExpressions:
          - key: kubernetes.io/metadata.name
            operator: NotIn
            values:
              - kyverno
              - kube-system
              - flux-system

    backgroundController:
      rbac:
        clusterRole:
          extraResources:
            - apiGroups: ["apps"]
              resources: ["deployments", "statefulsets", "daemonsets"]
              verbs: ["get", "list", "watch", "patch", "update"]
      labels:
        app: kyverno-background-controller
        env: production
        category: security
      podLabels:
        app: kyverno-background-controller
        env: production
        category: security
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi

    cleanupController:
      # Disabled: cleanup controller scans all CRDs including Calico tiered
      # policy CRDs (globalnetworkpolicies.projectcalico.org) which Calico's
      # webhook rejects for non-Enterprise users. Kyverno's resourceFilters
      # do not apply to the cleanup controller, and it has no exclude mechanism.
      # Re-enable when TTL policies are needed; check if a newer Kyverno version
      # resolves the Calico webhook conflict first.
      enabled: false
      labels:
        app: kyverno-cleanup-controller
        env: production
        category: security
      podLabels:
        app: kyverno-cleanup-controller
        env: production
        category: security
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi

    reportsController:
      labels:
        app: kyverno-reports-controller
        env: production
        category: security
      podLabels:
        app: kyverno-reports-controller
        env: production
        category: security
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

    config:
      resourceFilters:
        - '[GlobalNetworkPolicy,*,*]'
        - '[NetworkPolicy,*,*]'
        - '[Tier,*,*]'
        - '[StagedGlobalNetworkPolicy,*,*]'
        - '[StagedNetworkPolicy,*,*]'
        - '[StagedKubernetesNetworkPolicy,*,*]'
        - '[GlobalNetworkSet,*,*]'

    serviceMonitor:
      enabled: true
