apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: ignore-longhorn-dynamic-pods
  namespace: kyverno
  labels:
    app: kyverno
    env: production
    category: security
spec:
  # Longhorn creates several resource types that cannot be labelled via GitOps:
  # - DaemonSet/longhorn-manager and Deployment/longhorn-ui are third-party
  #   chart resources with no label injection point in their Helm values.
  # - instance-manager-*, share-manager-*, engine-image-*, longhorn-manager-*,
  #   longhorn-ui-*, and c-*-* (recurring job) pods are created dynamically by
  #   the Longhorn controller, not by any GitOps-managed workload spec.
  match:
    any:
      - resources:
          kinds:
            - DaemonSet
          namespaces:
            - longhorn-system
          names:
            - "longhorn-manager"
      - resources:
          kinds:
            - Deployment
          namespaces:
            - longhorn-system
          names:
            - "longhorn-ui"
      - resources:
          kinds:
            - Pod
          namespaces:
            - longhorn-system
          names:
            - "instance-manager-*"
            - "share-manager-*"
            - "engine-image-*"
            - "longhorn-manager-*"
            - "longhorn-ui-*"
            - "c-*"
  exceptions:
    - policyName: require-standard-labels
      ruleNames:
        - require-labels-on-controllers
        - require-labels-on-pods
    - policyName: require-resources
      ruleNames:
        - require-limits
