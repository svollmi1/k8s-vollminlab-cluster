apiVersion: kyverno.io/v2beta1
kind: ClusterPolicy
metadata:
  name: inject-namespace-labels
  annotations:
    policies.kyverno.io/title: Inject Namespace Labels
    policies.kyverno.io/category: Label Injection
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Automatically adds app, env, and category labels from the namespace to
      workloads (Deployment, StatefulSet, DaemonSet) and their pod templates.
      Uses +(label) syntax to only inject if the label is absent — existing
      labels on managed apps are preserved. Calico and kube-system are excluded
      permanently since they are CNI/kubeadm-managed and cannot be labelled via GitOps.
  labels:
    app: kyverno
    env: production
    category: security
spec:
  mutateExistingOnPolicyUpdate: true
  background: true
  rules:
    - name: inject-namespace-labels
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
                - DaemonSet
              namespaceSelector:
                matchExpressions:
                  - key: kubernetes.io/metadata.name
                    operator: NotIn
                    values:
                      - kube-system
                      - calico-system
                      - calico-apiserver
                      - tigera-operator
      context:
        - name: nsLabels
          apiCall:
            urlPath: "/api/v1/namespaces/{{ request.object.metadata.namespace }}"
            jmesPath: "metadata.labels"
      mutate:
        targets:
          - apiVersion: apps/v1
            kind: Deployment
          - apiVersion: apps/v1
            kind: StatefulSet
          - apiVersion: apps/v1
            kind: DaemonSet
        patchStrategicMerge:
          metadata:
            labels:
              +(app): "{{ nsLabels.app }}"
              +(env): "{{ nsLabels.env }}"
              +(category): "{{ nsLabels.category }}"
          spec:
            template:
              metadata:
                labels:
                  +(app): "{{ nsLabels.app }}"
                  +(env): "{{ nsLabels.env }}"
                  +(category): "{{ nsLabels.category }}"
