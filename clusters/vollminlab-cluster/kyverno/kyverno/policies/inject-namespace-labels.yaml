apiVersion: kyverno.io/v2beta1
kind: ClusterPolicy
metadata:
  name: inject-namespace-labels
  annotations:
    policies.kyverno.io/title: Inject Namespace Labels
    policies.kyverno.io/category: Label Injection
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Adds app, env, and category labels from the namespace to Deployment,
      StatefulSet, and DaemonSet objects and their pod templates at admission
      time. Uses +(label) syntax to only inject if the label is absent.
      Calico and kube-system are excluded permanently. Runs admission-only
      (background: false) — request.object.metadata.namespace is only reliable
      in admission context, not in background mutateExisting processing.
  labels:
    app: kyverno
    env: production
    category: security
spec:
  background: false
  rules:
    - name: inject-namespace-labels
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
                - DaemonSet
              namespaceSelector:
                matchExpressions:
                  - key: kubernetes.io/metadata.name
                    operator: NotIn
                    values:
                      - kube-system
                      - calico-system
                      - calico-apiserver
                      - tigera-operator
      context:
        - name: nsLabels
          apiCall:
            urlPath: "/api/v1/namespaces/{{ request.object.metadata.namespace }}"
            jmesPath: "metadata.labels"
      mutate:
        patchStrategicMerge:
          metadata:
            labels:
              +(app): "{{ nsLabels.app }}"
              +(env): "{{ nsLabels.env }}"
              +(category): "{{ nsLabels.category }}"
          spec:
            template:
              metadata:
                labels:
                  +(app): "{{ nsLabels.app }}"
                  +(env): "{{ nsLabels.env }}"
                  +(category): "{{ nsLabels.category }}"
