apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: eck-operator
  namespace: elastic-system
  labels:
    app: elastic-operator
    env: production
    category: observability
spec:
  interval: 5m
  chart:
    spec:
      chart: eck-operator
      version: 3.3.2
      sourceRef:
        kind: HelmRepository
        name: elastic-repo
        namespace: flux-system
  values:
    webhook:
      enabled: true
    config:
      logVerbosity: 1
    labels:
      app: elastic-operator
      env: production
      category: observability
    podLabels:
      app: elastic-operator
      env: production
      category: observability
    statefulsetLabels:
      app: elastic-operator
      env: production
      category: observability