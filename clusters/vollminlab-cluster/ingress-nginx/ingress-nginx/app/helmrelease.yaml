apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: ingress-nginx
  labels:
    app: ingress-nginx
    env: production
    category: networking
spec:
  interval: 5m
  chart:
    spec:
      chart: ingress-nginx
      version: 4.15.1
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx-repo
        namespace: flux-system
  releaseName: ingress-nginx
  install:
    createNamespace: false
  valuesFrom:
    - kind: ConfigMap
      name: ingress-nginx-values
      valuesKey: values.yaml
