apiVersion: batch/v1
kind: CronJob
metadata:
  name: kubeadm-cert-monitor
  namespace: kube-system
  labels:
    app: kubeadm-cert-monitor
    env: production
    category: core
spec:
  schedule: "0 9 1 * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    metadata:
      labels:
        app: kubeadm-cert-monitor
        env: production
        category: core
    spec:
      ttlSecondsAfterFinished: 3600
      backoffLimit: 0
      template:
        metadata:
          labels:
            app: kubeadm-cert-monitor
            env: production
            category: core
        spec:
          serviceAccountName: kubeadm-cert-monitor
          restartPolicy: Never
          containers:
            - name: kubeadm-cert-monitor
              image: docker.io/alpine/kubectl:1.33.4
              command:
                - /bin/sh
                - -c
                - |-
                  set -e
                  apk add --no-cache openssl curl

                  # Check a cert via kubectl exec and return days until expiry on stdout.
                  # All human-readable output goes to stderr.
                  # On kubectl exec failure, prints 9999 (safe sentinel) and returns without aborting.
                  check_cert() {
                    local pod="$1" cert_path="$2" label="$3"
                    local enddate
                    enddate=$(kubectl exec -n kube-system "$pod" -- \
                      openssl x509 -in "$cert_path" -noout -enddate 2>/dev/null) \
                      || { echo "$label: kubectl exec failed, skipping" >&2; echo "9999"; return; }
                    expiry=$(echo "$enddate" | cut -d= -f2)
                    expiry_epoch=$(date -d "$expiry" +%s)
                    now_epoch=$(date +%s)
                    days=$(( (expiry_epoch - now_epoch) / 86400 ))
                    echo "$label: expires $expiry (${days}d remaining)" >&2
                    echo "$days"
                  }

                  ALERT_MSG=""
                  SEVERITY=""

                  check_and_flag() {
                    local pod="$1" cert_path="$2" label="$3"
                    days=$(check_cert "$pod" "$cert_path" "$label")
                    if [ "$days" -lt 30 ]; then
                      ALERT_MSG="${ALERT_MSG}CRITICAL: $label expires in ${days}d\n"
                      SEVERITY="critical"
                    elif [ "$days" -lt 90 ]; then
                      ALERT_MSG="${ALERT_MSG}WARNING: $label expires in ${days}d\n"
                      [ "$SEVERITY" != "critical" ] && SEVERITY="warning"
                    fi
                  }

                  check_and_flag kube-apiserver-k8scp01 /etc/kubernetes/pki/apiserver.crt "apiserver-cp01"
                  check_and_flag kube-apiserver-k8scp01 /etc/kubernetes/pki/apiserver-kubelet-client.crt "apiserver-kubelet-client-cp01"
                  check_and_flag etcd-k8scp01 /etc/kubernetes/pki/etcd/server.crt "etcd-server-cp01"
                  check_and_flag etcd-k8scp01 /etc/kubernetes/pki/etcd/peer.crt "etcd-peer-cp01"
                  check_and_flag kube-apiserver-k8scp02 /etc/kubernetes/pki/apiserver.crt "apiserver-cp02"
                  check_and_flag etcd-k8scp02 /etc/kubernetes/pki/etcd/server.crt "etcd-server-cp02"
                  check_and_flag kube-apiserver-k8scp03 /etc/kubernetes/pki/apiserver.crt "apiserver-cp03"
                  check_and_flag etcd-k8scp03 /etc/kubernetes/pki/etcd/server.crt "etcd-server-cp03"

                  if [ -n "$ALERT_MSG" ]; then
                    echo "Sending Pushover alert (severity=$SEVERITY)"
                    curl -s --form-string "token=$PUSHOVER_TOKEN" \
                      --form-string "user=$PUSHOVER_USER_KEY" \
                      --form-string "title=Kubernetes cert expiry alert" \
                      --form-string "message=$(printf '%b' "$ALERT_MSG")" \
                      --form-string "priority=$([ "$SEVERITY" = "critical" ] && echo 1 || echo 0)" \
                      https://api.pushover.net/1/messages.json
                  else
                    echo "All certs healthy (>90 days to expiry)"
                  fi
              env:
                - name: PUSHOVER_USER_KEY
                  valueFrom:
                    secretKeyRef:
                      name: kubeadm-cert-pushover
                      key: user-key
                - name: PUSHOVER_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: kubeadm-cert-pushover
                      key: token
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 50m
                  memory: 64Mi
