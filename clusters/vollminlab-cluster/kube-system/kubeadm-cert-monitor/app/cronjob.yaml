apiVersion: batch/v1
kind: CronJob
metadata:
  name: kubeadm-cert-monitor
  namespace: kube-system
  labels:
    app: kubeadm-cert-monitor
    env: production
    category: core
spec:
  schedule: "0 9 1 * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    metadata:
      labels:
        app: kubeadm-cert-monitor
        env: production
        category: core
    spec:
      ttlSecondsAfterFinished: 3600
      backoffLimit: 0
      template:
        metadata:
          labels:
            app: kubeadm-cert-monitor
            env: production
            category: core
        spec:
          serviceAccountName: kubeadm-cert-monitor
          restartPolicy: Never
          containers:
            - name: kubeadm-cert-monitor
              image: docker.io/alpine/kubectl:1.33.4
              command:
                - /bin/sh
                - -c
                - |-
                  set -e
                  apk add --no-cache openssl curl -q

                  # Check a cert via kubectl exec and return days until expiry
                  check_cert() {
                    local pod="$1" cert_path="$2" label="$3"
                    expiry=$(kubectl exec -n kube-system "$pod" -- openssl x509 -in "$cert_path" -noout -enddate 2>/dev/null | cut -d= -f2)
                    expiry_epoch=$(date -d "$expiry" +%s)
                    now_epoch=$(date +%s)
                    days=$(( (expiry_epoch - now_epoch) / 86400 ))
                    echo "$label: expires $expiry ($days days)"
                    echo "$days"
                  }

                  ALERT_MSG=""
                  SEVERITY=""

                  check_and_flag() {
                    local pod="$1" cert_path="$2" label="$3"
                    days=$(check_cert "$pod" "$cert_path" "$label" | tail -1)
                    if [ "$days" -lt 30 ]; then
                      ALERT_MSG="${ALERT_MSG}CRITICAL: $label expires in ${days}d\n"
                      SEVERITY="critical"
                    elif [ "$days" -lt 90 ]; then
                      ALERT_MSG="${ALERT_MSG}WARNING: $label expires in ${days}d\n"
                      [ "$SEVERITY" != "critical" ] && SEVERITY="warning"
                    fi
                  }

                  check_and_flag kube-apiserver-k8scp01 /etc/kubernetes/pki/apiserver.crt "apiserver"
                  check_and_flag kube-apiserver-k8scp01 /etc/kubernetes/pki/apiserver-kubelet-client.crt "apiserver-kubelet-client"
                  check_and_flag etcd-k8scp01 /etc/kubernetes/pki/etcd/server.crt "etcd-server"
                  check_and_flag etcd-k8scp01 /etc/kubernetes/pki/etcd/peer.crt "etcd-peer"

                  if [ -n "$ALERT_MSG" ]; then
                    echo "Sending Pushover alert (severity=$SEVERITY)"
                    curl -s --form-string "token=$PUSHOVER_TOKEN" \
                      --form-string "user=$PUSHOVER_USER_KEY" \
                      --form-string "title=Kubernetes cert expiry alert" \
                      --form-string "message=$(printf '%b' "$ALERT_MSG")" \
                      --form-string "priority=$([ "$SEVERITY" = "critical" ] && echo 1 || echo 0)" \
                      https://api.pushover.net/1/messages.json
                  else
                    echo "All certs healthy (>90 days to expiry)"
                  fi
              env:
                - name: PUSHOVER_USER_KEY
                  valueFrom:
                    secretKeyRef:
                      name: kubeadm-cert-pushover
                      key: user-key
                - name: PUSHOVER_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: kubeadm-cert-pushover
                      key: token
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 50m
                  memory: 64Mi
