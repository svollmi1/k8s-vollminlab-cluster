apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubeadm-cert-monitor
  namespace: kube-system
  labels:
    app: kubeadm-cert-monitor
    env: production
    category: core
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubeadm-cert-monitor
  namespace: kube-system
  labels:
    app: kubeadm-cert-monitor
    env: production
    category: core
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubeadm-cert-monitor
  namespace: kube-system
  labels:
    app: kubeadm-cert-monitor
    env: production
    category: core
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kubeadm-cert-monitor
subjects:
  - kind: ServiceAccount
    name: kubeadm-cert-monitor
    namespace: kube-system
