apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: renovate
  namespace: renovate
  labels:
    app: renovate
    env: production
    category: apps
spec:
  interval: 10m
  chartRef:
    kind: OCIRepository
    name: renovate-repo
    namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: renovate-values
