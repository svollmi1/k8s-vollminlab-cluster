apiVersion: v1
kind: ConfigMap
metadata:
  name: capacitor-values
  namespace: flux-system
  labels:
    app: capacitor
    env: production
    category: core
data:
  values.yaml: |
    image:
      repository: ghcr.io/gimlet-io/capacitor
      tag: v0.14.0
    containerPort: 9000
    probe:
      enabled: true
      path: /
    resources:
      requests:
        cpu: 150m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    serviceAccount: capacitor
    securityContext:
      runAsNonRoot: true
      runAsUser: 100
      runAsGroup: 101
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
    podLabels:
      app: capacitor
      env: production
      category: core