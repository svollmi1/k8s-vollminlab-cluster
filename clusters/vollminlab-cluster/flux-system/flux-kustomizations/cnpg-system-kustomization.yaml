apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cnpg-system
  namespace: flux-system
  labels:
    app: cnpg
    env: production
    category: storage
spec:
  interval: 10m
  path: ./clusters/vollminlab-cluster/cnpg-system
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: cnpg-system
  timeout: 5m
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: cnpg-cloudnative-pg
      namespace: cnpg-system
