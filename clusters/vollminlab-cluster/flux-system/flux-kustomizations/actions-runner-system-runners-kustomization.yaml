apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: actions-runner-system-runners
  namespace: flux-system
  labels:
    app: arc-runners
    env: production
    category: ci
spec:
  interval: 10m
  path: ./clusters/vollminlab-cluster/actions-runner-system/arc-runners/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: actions-runner-system
  timeout: 5m
  dependsOn:
    - name: arc-controller
    - name: actions-runner-system
