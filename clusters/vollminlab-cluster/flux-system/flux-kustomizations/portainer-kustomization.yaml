apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: portainer
  namespace: flux-system
  labels:
    app: portainer
    env: production
    category: apps
spec:
  interval: 10m
  path: ./clusters/vollminlab-cluster/portainer
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 2m
