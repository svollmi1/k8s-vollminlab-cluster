apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: longhorn-system
  namespace: flux-system
  labels:
    app: longhorn
    env: production
    category: storage
spec:
  interval: 10m
  path: ./clusters/vollminlab-cluster/longhorn-system
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: longhorn-system
  timeout: 2m
