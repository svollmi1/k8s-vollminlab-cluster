apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: metallb-system
  namespace: flux-system
  labels:
    app: metallb
    env: production
    category: networking
spec:
  interval: 10m
  path: ./clusters/vollminlab-cluster/metallb-system
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: metallb-system
  timeout: 2m
