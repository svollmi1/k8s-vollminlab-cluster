apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-tofu-source-controller
  namespace: flux-system
  labels:
    app: flux
    env: production
    category: core
spec:
  podSelector:
    matchLabels:
      app: source-controller
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tofu
      ports:
        - protocol: TCP
          port: 9090
