apiVersion: v1
kind: ConfigMap
metadata:
  name: headlamp-values
  namespace: flux-system
  labels:
    app: headlamp
    env: production
    category: core
data:
  values.yaml: |
    config:
      inCluster: true
      inClusterContextName: "main"
      pluginsDir: "/headlamp/plugins"
      oidc:
        externalSecret:
          enabled: true
          name: headlamp-oidc-credentials
        secret:
          create: false

    initContainers:
      - name: headlamp-plugin-flux
        image: ghcr.io/headlamp-k8s/headlamp-plugin-flux:v0.6.0
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-c", "cp -r /plugins/* /headlamp/plugins/ 2>/dev/null || true"]
        volumeMounts:
          - name: headlamp-plugins
            mountPath: /headlamp/plugins

    volumeMounts:
      - name: headlamp-plugins
        mountPath: /headlamp/plugins

    volumes:
      - name: headlamp-plugins
        emptyDir: {}

    podLabels:
      app: headlamp
      env: production
      category: core

    serviceAccount:
      create: true

    clusterRoleBinding:
      create: true
      clusterRoleName: cluster-admin

    resources:
      requests:
        cpu: 150m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
